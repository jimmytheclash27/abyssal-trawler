<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Trawler - Fish Tank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
        }
        
        #info h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        #info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>Livewell Tank</h1>
        <p>Fish swimming animation</p>
        <p id="status">Loading...</p>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
